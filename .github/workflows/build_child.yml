---
# .github/workflows/build_image.yml
name: Reusable build container workflow

env:
  # BUILDX_NO_DEFAULT_ATTESTATIONS must be set to build only arm64 and amd64 images.
  # The devcontainers/ci@v0.3 build will fail if this env variable is not set.
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1

on:
  workflow_call:
    inputs:
      from_image:
        required: false
        type: string
        default: ghcr.io/aristanetworks/avd/universal
      from_variant:
        required: false
        type: string
        default: latest
      username:
        required: false
        type: string
        default: avd
      user_id:
        required: false
        type: string
        default: 1000
      group_id:
        required: false
        type: string
        default: 1000

permissions:
  packages: write

jobs:
  build_image:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code ✅
        uses: actions/checkout@v6

      - name: Convert Github repository name to lowercase ⬇
        id: gh_repo
        run: echo "name_lowcase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Setup QEMU for multi-arch builds 🏗
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ inputs.platform }}

      - name: Setup Docker buildX for multi-arch builds 🏗
        uses: docker/setup-buildx-action@v4

      - name: Login to the container registry 🗝
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-build dev container image 🔨
        uses: devcontainers/ci@v0.3
        env:
          FROM_IMAGE: ${{ inputs.from_image }}
          FROM_VARIANT: ${{ inputs.from_variant }}
          USERNAME: ${{ inputs.username }}
          UID: ${{ inputs.user_id }}
          GID: ${{ inputs.group_id }}
        with:
          subFolder: containers/lab
          imageName: ghcr.io/${{ steps.gh_repo.outputs.name_lowcase }}/lab
          imageTag: uid-${{ inputs.user_id }}
          platform: linux/arm64/v8,linux/amd64
          push: always